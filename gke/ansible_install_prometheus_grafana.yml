---
- name: Install Prometheus & Grafana Monitoring Stack in K3s Cluster
  hosts: os_servers
  become: yes
  gather_facts: yes
  vars:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    monitoring_namespace: monitoring

    # Domains for Ingress
    prometheus_domain: "prometheus.bunlong.uk"
    grafana_domain: "grafana.bunlong.uk"

    # Grafana credentials
    grafana_admin_user: "admin"
    grafana_admin_password: "admin"  # Change this!

    # Helm chart version (kube-prometheus-stack)
    # https://github.com/prometheus-community/helm-charts/releases
    kube_prometheus_stack_version: "82.10.3"

    # Master node control
    first_master: "{{ groups['os_servers'][0] }}"
    is_single_node: "{{ groups['os_servers'] | length == 1 }}"

  tasks:
    # ==========================================
    # Display Info
    # ==========================================
    - name: Display installation information
      debug:
        msg:
          - "=========================================="
          - "Installing In-Cluster Monitoring Stack"
          - "=========================================="
          - "Method: Helm (kube-prometheus-stack)"
          - "Chart Version: {{ kube_prometheus_stack_version }}"
          - "Namespace: {{ monitoring_namespace }}"
          - "Prometheus: https://{{ prometheus_domain }}"
          - "Grafana: https://{{ grafana_domain }}"
          - "=========================================="

    # ==========================================
    # Prerequisites
    # ==========================================
    - name: Check if K3s is running
      command: kubectl cluster-info
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: cluster_info
      changed_when: false

    - name: Check if Helm is installed
      command: helm version --short
      register: helm_check
      ignore_errors: yes
      changed_when: false

    - name: Install Helm if not present
      when: helm_check.rc != 0
      shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    # ==========================================
    # Create Namespace
    # ==========================================
    - name: Create monitoring namespace
      command: kubectl create namespace {{ monitoring_namespace }} --dry-run=client -o yaml
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ns_yaml
      changed_when: false

    - name: Apply monitoring namespace
      shell: |
        kubectl create namespace {{ monitoring_namespace }} --dry-run=client -o yaml | kubectl apply -f -
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ns_result
      changed_when: "'created' in ns_result.stdout"

    # ==========================================
    # Add Helm Repository
    # ==========================================
    - name: Add prometheus-community Helm repo
      command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: repo_add
      changed_when: "'has been added' in repo_add.stdout"
      failed_when: repo_add.rc != 0 and 'already exists' not in repo_add.stderr

    - name: Update Helm repos
      command: helm repo update
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      changed_when: false

    # ==========================================
    # Create Helm Values File
    # ==========================================
    - name: Create Helm values file for kube-prometheus-stack
      copy:
        dest: /tmp/kube-prometheus-stack-values.yml
        mode: '0644'
        content: |
          # ============================================================
          # kube-prometheus-stack Helm Values
          # ============================================================
          # WHAT THIS CHART INSTALLS:
          #   1. Prometheus Operator  — watches ServiceMonitor/PrometheusRule CRDs
          #   2. Prometheus           — metrics collection & alerting engine
          #   3. Grafana              — dashboards & visualization
          #   4. Node Exporter        — host-level metrics (CPU, memory, disk)
          #   5. kube-state-metrics   — Kubernetes object metrics (pods, deployments)
          #   6. Alertmanager         — alert routing & notification
          # ============================================================

          # ----------------------------------------------------------
          # Global
          # ----------------------------------------------------------
          # fullnameOverride: "monitoring"

          # ----------------------------------------------------------
          # Prometheus
          # ----------------------------------------------------------
          prometheus:
            prometheusSpec:
              # Scrape interval
              scrapeInterval: 15s
              evaluationInterval: 15s

              # Data retention
              retention: 15d

              # Storage (persistent volume for metrics data)
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 20Gi

              # Resource limits
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi

              # CRITICAL: Allow Prometheus to discover ServiceMonitors
              # and PrometheusRules in ALL namespaces (including kyc-blockchain)
              serviceMonitorSelectorNilUsesHelmValues: false
              ruleSelectorNilUsesHelmValues: false
              podMonitorSelectorNilUsesHelmValues: false
              probeSelectorNilUsesHelmValues: false

              # Match ServiceMonitors/PrometheusRules with ANY labels
              # (not just release: kube-prometheus-stack)
              serviceMonitorSelector: {}
              serviceMonitorNamespaceSelector: {}
              ruleSelector: {}
              ruleNamespaceSelector: {}
              podMonitorSelector: {}
              podMonitorNamespaceSelector: {}

              # External labels for all metrics
              externalLabels:
                cluster: k3s-cluster
                environment: production

          # ----------------------------------------------------------
          # Grafana
          # ----------------------------------------------------------
          grafana:
            # Admin credentials
            adminUser: "{{ grafana_admin_user }}"
            adminPassword: "{{ grafana_admin_password }}"

            # Persistence
            persistence:
              enabled: true
              storageClassName: local-path
              size: 5Gi

            # Resource limits
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 300m
                memory: 512Mi

            # Grafana configuration
            grafana.ini:
              server:
                domain: "{{ grafana_domain }}"
                root_url: "https://{{ grafana_domain }}"
              auth.anonymous:
                enabled: false

            # Pre-installed dashboards
            defaultDashboardsEnabled: true
            defaultDashboardsTimezone: Asia/Phnom_Penh

            # Additional dashboard providers
            dashboardProviders:
              dashboardproviders.yaml:
                apiVersion: 1
                providers:
                  - name: 'custom'
                    orgId: 1
                    folder: 'Custom'
                    type: file
                    disableDeletion: false
                    editable: true
                    options:
                      path: /var/lib/grafana/dashboards/custom

            # Import community dashboards by ID
            dashboards:
              custom:
                node-exporter-full:
                  gnetId: 1860
                  revision: 37
                  datasource: Prometheus
                kubernetes-overview:
                  gnetId: 15757
                  revision: 42
                  datasource: Prometheus
                prometheus-stats:
                  gnetId: 19105
                  revision: 7
                  datasource: Prometheus

          # ----------------------------------------------------------
          # Node Exporter (runs on every node as DaemonSet)
          # ----------------------------------------------------------
          nodeExporter:
            enabled: true

          prometheus-node-exporter:
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi

          # ----------------------------------------------------------
          # kube-state-metrics
          # ----------------------------------------------------------
          kubeStateMetrics:
            enabled: true

          # ----------------------------------------------------------
          # Alertmanager
          # ----------------------------------------------------------
          alertmanager:
            alertmanagerSpec:
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: local-path
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 2Gi
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi

    # ==========================================
    # Install/Upgrade via Helm
    # ==========================================
    - name: Install kube-prometheus-stack via Helm
      shell: |
        helm upgrade --install kube-prometheus-stack \
          prometheus-community/kube-prometheus-stack \
          --namespace {{ monitoring_namespace }} \
          --version {{ kube_prometheus_stack_version }} \
          --values /tmp/kube-prometheus-stack-values.yml \
          --timeout 10m \
          --wait
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: helm_install
      changed_when: "'STATUS: deployed' in helm_install.stdout"

    - name: Display Helm install output
      debug:
        var: helm_install.stdout_lines

    # ==========================================
    # Create Ingress for External Access
    # ==========================================
    - name: Get Prometheus service name
      shell: kubectl get svc -n {{ monitoring_namespace }} -o name | grep prometheus | grep -v node-exporter | grep -v operator | grep -v alertmanager | grep -v operated | grep -v grafana | grep -v kube-state-metrics | head -1 | sed 's|service/||'
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: prometheus_svc_name
      changed_when: false

    - name: Get Grafana service name
      shell: kubectl get svc -n {{ monitoring_namespace }} -o name | grep grafana | head -1 | sed 's|service/||'
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: grafana_svc_name
      changed_when: false

    - name: Display discovered service names
      debug:
        msg:
          - "Prometheus service: {{ prometheus_svc_name.stdout }}"
          - "Grafana service: {{ grafana_svc_name.stdout }}"

    - name: Create Prometheus Ingress
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: prometheus-ingress
          namespace: {{ monitoring_namespace }}
          annotations:
            kubernetes.io/ingress.class: "traefik"
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
        spec:
          tls:
          - hosts:
            - {{ prometheus_domain }}
            secretName: tls-prometheus-ingress
          rules:
          - host: {{ prometheus_domain }}
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: {{ prometheus_svc_name.stdout }}
                    port:
                      number: 9090
        EOF
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: prom_ingress
      changed_when: "'created' in prom_ingress.stdout or 'configured' in prom_ingress.stdout"

    - name: Create Grafana Ingress
      shell: |
        cat <<'EOF' | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: grafana-ingress
          namespace: {{ monitoring_namespace }}
          annotations:
            kubernetes.io/ingress.class: "traefik"
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
        spec:
          tls:
          - hosts:
            - {{ grafana_domain }}
            secretName: tls-grafana-ingress
          rules:
          - host: {{ grafana_domain }}
            http:
              paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: {{ grafana_svc_name.stdout }}
                    port:
                      number: 80
        EOF
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: graf_ingress
      changed_when: "'created' in graf_ingress.stdout or 'configured' in graf_ingress.stdout"

    # ==========================================
    # Wait & Verify
    # ==========================================
    - name: Wait for all monitoring pods to be ready
      shell: |
        kubectl wait --for=condition=ready pod \
          --all \
          --namespace {{ monitoring_namespace }} \
          --timeout=300s
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: pods_ready
      retries: 3
      delay: 10
      until: pods_ready.rc == 0

    - name: Get all monitoring pods
      command: kubectl get pods -n {{ monitoring_namespace }} -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: monitoring_pods
      changed_when: false

    - name: Display monitoring pods
      debug:
        var: monitoring_pods.stdout_lines

    - name: Get all monitoring services
      command: kubectl get svc -n {{ monitoring_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: monitoring_svcs
      changed_when: false

    - name: Display monitoring services
      debug:
        var: monitoring_svcs.stdout_lines

    - name: Get ingress status
      command: kubectl get ingress -n {{ monitoring_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: ingress_status
      changed_when: false

    - name: Display ingress status
      debug:
        var: ingress_status.stdout_lines

    - name: Verify CRDs are installed
      shell: kubectl get crd | grep monitoring.coreos.com
      environment:
        KUBECONFIG: "{{ kubeconfig_path }}"
      register: crds_check
      changed_when: false

    - name: Display installed CRDs
      debug:
        var: crds_check.stdout_lines

    # ==========================================
    # Cleanup
    # ==========================================
    - name: Remove temporary values file
      file:
        path: /tmp/kube-prometheus-stack-values.yml
        state: absent

    # ==========================================
    # Summary
    # ==========================================
    - name: Set access info
      set_fact:
        monitoring_access_info: |
          ==========================================
            ✅ In-Cluster Monitoring Stack Installed!
          ==========================================

          📊 PROMETHEUS
            URL: https://{{ prometheus_domain }}
            Internal: http://kube-prometheus-stack-prometheus.{{ monitoring_namespace }}.svc:9090

          📉 GRAFANA
            URL: https://{{ grafana_domain }}
            Internal: http://kube-prometheus-stack-grafana.{{ monitoring_namespace }}.svc:80
            Username: {{ grafana_admin_user }}
            Password: {{ grafana_admin_password }}

          📈 NODE EXPORTER
            Runs as DaemonSet on every node (automatic)

          ==========================================
            What Got Installed (CRDs):
          ==========================================

          ServiceMonitor       — auto-configure Prometheus scrape targets
          PrometheusRule       — define alerting/recording rules
          PodMonitor           — scrape pods directly (no Service needed)
          Probe                — blackbox probing (HTTP, TCP, etc.)
          Alertmanager         — alert routing config
          Prometheus           — Prometheus instance config
          ThanosRuler          — Thanos rule evaluation (optional)

          ==========================================
            DNS Configuration:
          ==========================================

          {{ prometheus_domain }} → {{ ansible_default_ipv4.address }}
          {{ grafana_domain }} → {{ ansible_default_ipv4.address }}

          ==========================================
            Verify Commands:
          ==========================================

          # Check all monitoring pods
          kubectl get pods -n {{ monitoring_namespace }}

          # Check ServiceMonitors across all namespaces
          kubectl get servicemonitors --all-namespaces

          # Check PrometheusRules across all namespaces
          kubectl get prometheusrules --all-namespaces

          # Check Prometheus targets (should show kyc-blockchain)
          kubectl port-forward svc/kube-prometheus-stack-prometheus 9090:9090 -n {{ monitoring_namespace }}
          # Then open: http://localhost:9090/targets

          # Check Grafana
          kubectl port-forward svc/kube-prometheus-stack-grafana 3000:80 -n {{ monitoring_namespace }}
          # Then open: http://localhost:3000

          # Check CRDs
          kubectl get crd | grep monitoring.coreos.com

          # Check certificates
          kubectl get certificates -n {{ monitoring_namespace }}
          kubectl get ingress -n {{ monitoring_namespace }}

          ---

          # DEBUGGING & MANAGEMENT
          # Check DNS Resolution && Check Helm Release & Pods
          nslookup prometheus.bunlong.uk
          nslookup grafana.bunlong.uk

          dig prometheus.bunlong.uk
          dig prometheus.bunlong.uk

          helm list -n monitoring

          ---

          # Check the Prometheus Service Name
          kubectl get pods -n monitoring -o wide

          # List actual service names
          kubectl get svc -n monitoring

          ---

          # Check Ingress Configuration
          # Check ingress details
          kubectl get ingress -n monitoring

          # Detailed view — look for the backend service name and status
          kubectl describe ingress prometheus-ingress -n monitoring

          ---

          # Check TLS Certificate
          # Is the TLS secret created?
          kubectl get secret tls-prometheus-ingress -n monitoring

          # Check cert-manager certificate status
          kubectl get certificates -n monitoring

          # If certificate is not Ready:
          kubectl describe certificate -n monitoring
          kubectl logs -n cert-manager -l app=cert-manager --tail=100

          ==========================================
            Helm Management:
          ==========================================

          # Check release status
          helm list -n {{ monitoring_namespace }}

          # View current values
          helm get values kube-prometheus-stack -n {{ monitoring_namespace }}

          # Upgrade with new values
          helm upgrade kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace {{ monitoring_namespace }} \
            --values /path/to/values.yml

          ==========================================

    - name: Display installation summary
      debug:
        msg: "{{ monitoring_access_info.split('\n') }}"

    - name: Save access info to remote server
      copy:
        dest: /root/prometheus-grafana-access-info.txt
        content: "{{ monitoring_access_info }}"
        mode: "0600"

    - name: Save access info to local machine
      delegate_to: localhost
      become: no
      copy:
        dest: ./rancher/prometheus-grafana-access-info.txt
        content: "{{ monitoring_access_info }}"
        mode: "0644"